<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setlist & Cifras Sincronizado</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-color: #ff9800; 
            --button-bg: #2a2a2a;
            --modal-bg: rgba(0, 0, 0, 0.8);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        header h1 { margin: 0; font-size: 2rem; color: var(--accent-color); }

        .controls { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }

        .search-bar {
            padding: 10px 15px; width: 250px; border-radius: 20px;
            border: 1px solid #444; background-color: var(--card-bg);
            color: white; outline: none;
        }

        .grid-repertorio {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; max-width: 1200px; margin: 0 auto;
        }

        .card-musica {
            background-color: var(--card-bg); border-radius: 12px;
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s ease; position: relative;
        }
        .card-musica:hover { transform: translateY(-5px); }

        .banner-banda { width: 100%; height: 120px; background-size: cover; background-position: center; position: relative; }
        .banner-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(30,30,30,0.95)); padding: 10px 15px;
        }

        .nome-banda { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-color); font-weight: bold; }
        .conteudo-musica { padding: 15px; }
        .titulo-musica { margin: 0 0 15px 0; font-size: 1.3rem; }
        .links-container { display: flex; flex-direction: column; gap: 10px; }

        .btn-link {
            display: flex; align-items: center; justify-content: center;
            padding: 10px; border-radius: 6px; text-decoration: none;
            font-weight: 600; font-size: 0.9rem; transition: background 0.2s;
        }

        .btn-word { background-color: #2b579a; color: white; }
        .btn-word:hover { background-color: #1e3d6b; }
        .btn-word.disabled { background-color: #223355; opacity: 0.3; cursor: not-allowed; }

        .btn-youtube { background-color: #cc181e; color: white; }
        .btn-youtube:hover { background-color: #991115; }
        .btn-youtube.disabled { background-color: #441111; opacity: 0.3; cursor: not-allowed; }

        .btn-cifra { background-color: var(--button-bg); color: var(--text-color); border: 1px solid #444; }
        .btn-cifra:hover { background-color: #3a3a3a; }
        .btn-cifra.disabled { opacity: 0.2; cursor: not-allowed; }

        .btn-adicionar {
            background-color: var(--accent-color); color: black; border: none;
            padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
        .btn-adicionar:hover { background-color: #e08600; }

        .status-msg { text-align: center; color: var(--text-secondary); grid-column: 1/-1; padding: 40px; font-size: 1.2rem;}

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--modal-bg); z-index: 100; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { background-color: var(--card-bg); padding: 25px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #333; }
        .modal-content h2 { margin-top: 0; color: var(--accent-color); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-secondary); }
        .form-group input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background-color: #121212; color: white; outline: none; }
        .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancelar { background: transparent; color: white; border: 1px solid #555; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-salvar { background: var(--accent-color); color: black; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-salvar:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Setlist & Cifras</h1>
            <p style="color: var(--text-secondary); margin: 5px 0 0 0;">Repertório Sincronizado da Banda</p>
        </div>
        <div class="controls">
            <input type="text" id="searchIn" class="search-bar" placeholder="Buscar música ou banda..." oninput="filtrarMusicas()">
            <button class="btn-adicionar" onclick="abrirModal()">+ Nova Música</button>
        </div>
    </header>

    <main class="grid-repertorio" id="gridRepertorio">
        <div class="status-msg">Sincronizando com o repertório da banda...</div>
    </main>

    <div class="modal" id="modalForm">
        <div class="modal-content">
            <h2>Adicionar ao Repertório</h2>
            <div class="form-group">
                <label>Música *</label>
                <input type="text" id="formMusica" required>
            </div>
            <div class="form-group">
                <label>Banda *</label>
                <input type="text" id="formBanda" required>
            </div>
            <div class="form-group">
                <label>Link da Cifra Word (OneDrive/Google Drive)</label>
                <input type="url" id="formLinkWord" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Link do Vídeo (YouTube)</label>
                <input type="url" id="formLinkYoutube" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Link de Cifra Alternativa (Web)</label>
                <input type="url" id="formLinkCifra" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>URL do Banner da Banda (Opcional)</label>
                <input type="url" id="formBanner" placeholder="Deixe em branco para o padrão">
            </div>
            <div class="form-group" style="border-top: 1px solid #333; padding-top: 15px; margin-top: 15px;">
                <label style="color: var(--accent-color); font-weight: bold;">Chave/Senha de Ensaio *</label>
                <input type="password" id="formSenha" placeholder="Digite a senha para autorizar" required>
            </div>
            <div class="form-actions">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-salvar" id="btnSalvarId" onclick="salvarMusica()">Salvar Música</button>
            </div>
        </div>
    </div>

        // URL da API do Google Apps Script configurada
        const GOOGLE_SCRIPT_URL = "
